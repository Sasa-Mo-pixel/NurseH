<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shock</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<a href="index.html" class="back-btn">
  <i class="fa-solid fa-arrow-left"></i>
  Back
</a>
<body>

<div class="layout">

  <div class="content">

    <h1>❤️ Shock</h1>

    <div class="grid">

      <div class="box">
        <h3>Definition</h3>
        <p>Circulatory failure causing low oxygen delivery.</p>
      </div>

      <div class="box">
        <h3>Types</h3>
        <ul>
          <li>Hypovolemic</li>
          <li>Cardiogenic</li>
          <li>Septic</li>
        </ul>
      </div>

      <div class="box">
        <h3>Symptoms</h3>
        <ul>
          <li>Low BP</li>
          <li>Fast pulse</li>
        </ul>
      </div>

      <div class="box">
        <h3>Nursing</h3>
        <ul>
          <li>Oxygen</li>
          <li>IV fluids</li>
        </ul>
      </div>

    </div>

  </div>

</div>

</body>
</html>
