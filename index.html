<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NurseH+</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2><i class="fa-solid fa-heart-pulse"></i> NurseH+</h2>

 <ul>
  <li class="active"><i class="fa-solid fa-house"></i> Home</li>
  <li><i class="fa-solid fa-notes-medical"></i> Conditions</li>
  <li><i class="fa-solid fa-calculator"></i> Calculators</li>
</ul>
</div>

<!-- Main -->
<div class="main">

  <!-- Top Bar -->
  <div class="topbar">
    <input type="text" id="search" placeholder="Search condition...">
  </div>

  <!-- Cards -->
  <div class="cards">

    <a href="shock.html" class="card">
      <i class="fa-solid fa-heart-pulse"></i>
      <h3>Shock</h3>
      <p>Circulatory failure</p>
      <span>View →</span>
    </a>

    <a href="dka.html" class="card">
      <i class="fa-solid fa-syringe"></i>
      <h3>DKA</h3>
      <p>Hyperglycemia + Ketones</p>
      <span>View →</span>
    </a>

    <a href="asthma.html" class="card">
      <i class="fa-solid fa-lungs"></i>
      <h3>Asthma</h3>
      <p>Airway narrowing</p>
      <span>View →</span>
    </a>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
